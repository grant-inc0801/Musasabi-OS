<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>MUSA</title>
    <style>
      /* 右下常駐アバター+吹き出し+ミニパネル(D-20260706-004)。
         ウィンドウ自体は透過で、右下にアバター、その上に吹き出し/ミニパネルを重ねる。 */
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI Variable", "Segoe UI", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      }
      #stack {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-end;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      /* 吹き出し(提案・通知) */
      #bubble {
        max-width: 280px;
        /* 透過ウィンドウでは backdrop-filter が全面に膜を作るため使わない
           (ガラス感は半透明背景+ハイライトで表現)。 */
        background: rgba(24, 30, 46, 0.92);
        color: #e6e9f2;
        border: 1px solid rgba(151, 168, 205, 0.2);
        border-radius: 12px 12px 2px 12px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.5;
        /* 外側シャドウは透過ウィンドウでは輪郭の外に膜として見えるため使わない。 */
        cursor: pointer;
      }
      #bubble.hidden {
        display: none;
      }
      /* ミニパネル */
      #panel {
        width: 300px;
        /* 同上: パネル部分のみ半透明ガラス面(blurなし)。 */
        background: rgba(18, 23, 37, 0.92);
        color: #e6e9f2;
        border: 1px solid rgba(151, 168, 205, 0.2);
        border-radius: 12px;
        padding: 12px;
        /* ガラス面はパネルの輪郭(角丸)内のみ。外側シャドウは膜に見えるため無し。 */
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #panel.hidden {
        display: none;
      }
      #panel h1 {
        font-size: 13px;
        margin: 0;
        color: #9aa3ba;
        font-weight: normal;
      }
      /* 2階層メニュー: 大項目(コールシステム/業務支援)押下で小項目が現れ、
         該当の小項目に緑ランプ点灯(ユーザーFB第5弾) */
      #menu {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #menu button,
      #biz-support-list button {
        display: flex;
        align-items: center;
        gap: 8px;
        text-align: left;
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid rgba(151, 168, 205, 0.2);
        background: rgba(30, 37, 56, 0.6);
        color: #e6e9f2;
        cursor: pointer;
      }
      #menu button.major {
        font-weight: bold;
      }
      #menu button.minor {
        margin-left: 14px;
        width: calc(100% - 14px);
        box-sizing: border-box;
      }
      #menu button.active,
      #biz-support-list button.active {
        border-color: #3fb950;
      }
      #menu .lamp,
      #biz-support-list .lamp {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3a4157;
        flex-shrink: 0;
      }
      #menu button.active .lamp,
      #biz-support-list button.active .lamp {
        background: #3fb950;
        box-shadow: 0 0 6px #3fb950;
      }
      #menu .minors.hidden,
      .biz-view.hidden {
        display: none;
      }
      .biz-view {
        margin-left: 14px;
        padding: 8px;
        border: 1px solid rgba(151, 168, 205, 0.14);
        border-radius: 8px;
        background: rgba(10, 13, 22, 0.4);
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .biz-view input[type="text"] {
        background: rgba(10, 13, 22, 0.55);
        border: 1px solid rgba(151, 168, 205, 0.2);
        border-radius: 6px;
        color: #e6e9f2;
        padding: 5px 8px;
        font-size: 12px;
      }
      .biz-view .hint {
        color: #9aa3ba;
        font-size: 11px;
        margin: 0;
      }
      #mode-note {
        font-size: 11px;
        color: #f0883e;
        margin: 0;
        min-height: 14px;
      }
      #chat-log {
        height: 120px;
        overflow-y: auto;
        background: rgba(10, 13, 22, 0.55);
        border: 1px solid rgba(151, 168, 205, 0.14);
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
        line-height: 1.5;
      }
      #chat-log p {
        margin: 0 0 6px;
      }
      #chat-log .musa {
        color: #7ee787;
      }
      #chat-row {
        display: flex;
        gap: 6px;
      }
      #chat-input {
        flex: 1;
        background: rgba(10, 13, 22, 0.55);
        border: 1px solid rgba(151, 168, 205, 0.2);
        border-radius: 8px;
        color: #e6e9f2;
        padding: 6px 8px;
        font-size: 12px;
      }
      #panel .footer-btn {
        font-size: 12px;
        padding: 7px;
        border-radius: 8px;
        border: 1px solid rgba(151, 168, 205, 0.2);
        background: rgba(30, 37, 56, 0.6);
        color: #e6e9f2;
        cursor: pointer;
      }
      #send-btn {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        border: none;
        background: #2f6feb;
        color: #fff;
        cursor: pointer;
      }
      /* アバター本体(クリックでミニパネル開閉)。
         背景の円形バッジは持たず、キャラクターだけがデスクトップに浮かぶ見た目にする
         (3Dアバター実装までのプレースホルダー。D-20260706 ユーザーFB)。 */
      :root {
        --avatar-size: 80px;
      }
      #avatar-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #avatar {
        width: var(--avatar-size);
        height: var(--avatar-size);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: calc(var(--avatar-size) * 0.9);
        line-height: 1;
        cursor: pointer;
        user-select: none;
        /* drop-shadow は透過ウィンドウでアバター周囲に膜として描画されるため使わない。
           キャラクターの輪郭外は完全透過。 */
      }
      #avatar canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
      /* 公式マスコット画像(管理画面と統一・ユーザーFB第5弾)。
         クリックはコンテナ(#avatar)側で受けるため画像は素通しにする。 */
      #avatar img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        pointer-events: none;
        animation: mascot-float 3.4s ease-in-out infinite;
      }
      @keyframes mascot-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #avatar img {
          animation: none;
        }
      }
      /* 配置換え用のドラッグハンドル(ホバー時のみ表示) */
      #drag-handle {
        font-size: 11px;
        color: #9aa3ba;
        background: #151a28cc;
        border: 1px solid rgba(151, 168, 205, 0.2);
        border-radius: 6px;
        padding: 1px 8px;
        margin-bottom: 4px;
        cursor: move;
        opacity: 0;
        transition: opacity 0.15s;
        user-select: none;
      }
      #avatar-wrap:hover #drag-handle,
      #drag-handle:hover {
        opacity: 1;
      }
      /* アバターサイズ調整(スライダーのみ) */
      #size-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #size-slider {
        flex: 1;
        accent-color: #2f6feb;
      }
    </style>
  </head>
  <body>
    <div id="stack">
      <div id="bubble" class="hidden" title="クリックで閉じる"></div>
      <div id="panel" class="hidden">
        <h1>MUSA ミニパネル — 現在: <span id="mode-label"></span></h1>
        <div id="menu"></div>
        <div id="biz-learning" class="biz-view hidden">
          <p class="hint">日々の作業内容を学習させます(AI社員共通の学習素材。保存は端末内のみ)。</p>
          <input id="biz-learn-input" type="text" placeholder="例: 「高い」には事例→数値の順で返す" />
          <button id="biz-learn-add" type="button">学習させる</button>
          <p id="biz-learn-note" class="hint"></p>
        </div>
        <div id="biz-development" class="biz-view hidden">
          <p class="hint">
            記録開始中のメイン画面での操作(ページ移動)を解析し、自動化ツールとして保存します。
          </p>
          <input id="biz-dev-name" type="text" placeholder="自動化の名前(例: 朝の確認ルート)" />
          <button id="biz-dev-toggle" type="button">記録を開始</button>
          <p id="biz-dev-note" class="hint"></p>
        </div>
        <div id="biz-support" class="biz-view hidden">
          <p class="hint">保存した自動化を選択すると実行されます(選択中にランプ点灯)。</p>
          <div id="biz-support-list" style="display: flex; flex-direction: column; gap: 4px"></div>
        </div>
        <p id="mode-note"></p>
        <div id="chat-log"></div>
        <div id="chat-row">
          <input id="chat-input" type="text" placeholder="AI社員へ指示…" />
          <button id="send-btn" type="button">送信</button>
        </div>
        <div id="size-row">
          <span style="font-size: 11px; color: #9aa3ba">アバターサイズ</span>
          <input id="size-slider" type="range" min="48" max="160" step="4" />
        </div>
        <button id="open-main" class="footer-btn" type="button">メイン管理画面を開く</button>
      </div>
      <div id="avatar-wrap">
        <span id="drag-handle" data-tauri-drag-region title="ドラッグで移動">⠿ 移動</span>
        <span id="avatar" title="クリックでミニパネルを開閉"></span>
      </div>
    </div>
    <script type="module" src="/src/avatarMain.ts"></script>
  </body>
</html>
