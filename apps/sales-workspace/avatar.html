<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>MUSA</title>
    <style>
      /* 右下常駐アバター+吹き出し+ミニパネル(D-20260706-004)。
         ウィンドウ自体は透過で、右下にアバター、その上に吹き出し/ミニパネルを重ねる。 */
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: sans-serif;
      }
      #stack {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-end;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      /* 吹き出し(提案・通知) */
      #bubble {
        max-width: 280px;
        background: #1c2333;
        color: #e6e9f2;
        border: 1px solid #2d3650;
        border-radius: 12px 12px 2px 12px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.5;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }
      #bubble.hidden {
        display: none;
      }
      /* ミニパネル */
      #panel {
        width: 300px;
        background: #151a28;
        color: #e6e9f2;
        border: 1px solid #2d3650;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #panel.hidden {
        display: none;
      }
      #panel h1 {
        font-size: 13px;
        margin: 0;
        color: #9aa3ba;
        font-weight: normal;
      }
      /* モード切替: 縦配置。該当モードに緑ランプ点灯(D-20260706 ユーザーFB) */
      #mode-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #mode-row button {
        display: flex;
        align-items: center;
        gap: 8px;
        text-align: left;
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid #2d3650;
        background: #1c2333;
        color: #e6e9f2;
        cursor: pointer;
      }
      #mode-row button.active {
        border-color: #3fb950;
      }
      #mode-row .lamp {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3a4157;
        flex-shrink: 0;
      }
      #mode-row button.active .lamp {
        background: #3fb950;
        box-shadow: 0 0 6px #3fb950;
      }
      #mode-note {
        font-size: 11px;
        color: #f0883e;
        margin: 0;
        min-height: 14px;
      }
      #chat-log {
        height: 120px;
        overflow-y: auto;
        background: #0d111c;
        border: 1px solid #222a3f;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
        line-height: 1.5;
      }
      #chat-log p {
        margin: 0 0 6px;
      }
      #chat-log .musa {
        color: #7ee787;
      }
      #chat-row {
        display: flex;
        gap: 6px;
      }
      #chat-input {
        flex: 1;
        background: #0d111c;
        border: 1px solid #2d3650;
        border-radius: 8px;
        color: #e6e9f2;
        padding: 6px 8px;
        font-size: 12px;
      }
      #panel .footer-btn {
        font-size: 12px;
        padding: 7px;
        border-radius: 8px;
        border: 1px solid #2d3650;
        background: #1c2333;
        color: #e6e9f2;
        cursor: pointer;
      }
      #send-btn {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        border: none;
        background: #2f6feb;
        color: #fff;
        cursor: pointer;
      }
      /* アバター本体(クリックでミニパネル開閉)。
         背景の円形バッジは持たず、キャラクターだけがデスクトップに浮かぶ見た目にする
         (3Dアバター実装までのプレースホルダー。D-20260706 ユーザーFB)。 */
      :root {
        --avatar-size: 80px;
      }
      #avatar-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #avatar {
        width: var(--avatar-size);
        height: var(--avatar-size);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: calc(var(--avatar-size) * 0.9);
        line-height: 1;
        cursor: pointer;
        user-select: none;
        filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
      }
      /* 配置換え用のドラッグハンドル(ホバー時のみ表示) */
      #drag-handle {
        font-size: 11px;
        color: #9aa3ba;
        background: #151a28cc;
        border: 1px solid #2d3650;
        border-radius: 6px;
        padding: 1px 8px;
        margin-bottom: 4px;
        cursor: move;
        opacity: 0;
        transition: opacity 0.15s;
        user-select: none;
      }
      #avatar-wrap:hover #drag-handle,
      #drag-handle:hover {
        opacity: 1;
      }
      /* アバターサイズ調整(スライダーのみ) */
      #size-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #size-slider {
        flex: 1;
        accent-color: #2f6feb;
      }
    </style>
  </head>
  <body>
    <div id="stack">
      <div id="bubble" class="hidden" title="クリックで閉じる"></div>
      <div id="panel" class="hidden">
        <h1>MUSA ミニパネル — 現在: <span id="mode-label"></span></h1>
        <div id="mode-row"></div>
        <p id="mode-note"></p>
        <div id="chat-log"></div>
        <div id="chat-row">
          <input id="chat-input" type="text" placeholder="AI社員へ指示…" />
          <button id="send-btn" type="button">送信</button>
        </div>
        <div id="size-row">
          <span style="font-size: 11px; color: #9aa3ba">アバターサイズ</span>
          <input id="size-slider" type="range" min="48" max="160" step="4" />
        </div>
        <button id="open-main" class="footer-btn" type="button">メイン管理画面を開く</button>
      </div>
      <div id="avatar-wrap">
        <span id="drag-handle" data-tauri-drag-region title="ドラッグで移動">⠿ 移動</span>
        <span id="avatar" title="クリックでミニパネルを開閉"></span>
      </div>
    </div>
    <script type="module" src="/src/avatarMain.ts"></script>
  </body>
</html>
