<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="灰の中で両手に守られた小さな火種">
  <defs>
    <radialGradient id="ember05" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff2c4"/>
      <stop offset="0.35" stop-color="#ffb44a"/>
      <stop offset="0.7" stop-color="#e5602a"/>
      <stop offset="1" stop-color="#8a2c14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1614"/>
      <stop offset="1" stop-color="#0a0806"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="#080604"/>
  <rect x="18" y="18" width="864" height="524" fill="url(#bg05)"/>
  <!-- drifting ash flecks -->
  <g fill="#8a8078" opacity="0.5">
    <circle cx="180" cy="120" r="2.5"/><circle cx="260" cy="200" r="1.8"/><circle cx="140" cy="300" r="2"/>
    <circle cx="700" cy="150" r="2.4"/><circle cx="760" cy="260" r="1.6"/><circle cx="660" cy="330" r="2"/>
    <circle cx="420" cy="90" r="1.8"/><circle cx="520" cy="140" r="2.2"/>
  </g>
  <!-- rising sparks -->
  <g fill="#ffb44a">
    <circle cx="450" cy="250" r="2.5" opacity="0.9"/>
    <circle cx="470" cy="210" r="2" opacity="0.7"/>
    <circle cx="432" cy="200" r="1.8" opacity="0.6"/>
    <circle cx="458" cy="160" r="1.5" opacity="0.45"/>
    <circle cx="440" cy="130" r="1.2" opacity="0.3"/>
  </g>
  <!-- glow of the ember -->
  <circle cx="450" cy="330" r="150" fill="url(#ember05)"/>
  <!-- two cupped hands holding the ember -->
  <g fill="#151008">
    <!-- left hand -->
    <path d="M300,430
             c-10,-40 20,-70 70,-84
             c30,-8 55,-4 78,6
             c-30,4 -58,16 -80,40
             c-16,18 -24,40 -24,58
             c-24,-2 -40,-10 -44,-20 z"/>
    <!-- right hand -->
    <path d="M600,430
             c10,-40 -20,-70 -70,-84
             c-30,-8 -55,-4 -78,6
             c30,4 58,16 80,40
             c16,18 24,40 24,58
             c24,-2 40,-10 44,-20 z"/>
  </g>
  <!-- the ember core -->
  <circle cx="450" cy="332" r="26" fill="#ffd873"/>
  <circle cx="450" cy="332" r="14" fill="#fff6da"/>
  <rect x="18" y="502" width="864" height="40" fill="#000000" opacity="0.45"/>
  <text x="36" y="529" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="19" fill="#ffcf9a" letter-spacing="2">――灰は、燃え残りだ。まだ、燃える。</text>
  <rect x="18" y="18" width="864" height="524" fill="none" stroke="#e5602a" stroke-width="1.5" opacity="0.55"/>
</svg>
