<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="崩れ落ちる資産グラフ、去っていく裏切り者の背中と一枚の値札">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241016"/>
      <stop offset="1" stop-color="#100609"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="#0b0508"/>
  <rect x="18" y="18" width="864" height="524" fill="url(#bg04)"/>
  <!-- shattered / falling asset graph -->
  <g transform="translate(60,70)">
    <line x1="0" y1="0" x2="0" y2="360" stroke="#5a3a44" stroke-width="2"/>
    <line x1="0" y1="360" x2="620" y2="360" stroke="#5a3a44" stroke-width="2"/>
    <!-- rising then crashing line -->
    <polyline points="0,320 90,270 180,210 270,150 360,110 420,120" fill="none" stroke="#c9a06a" stroke-width="4"/>
    <!-- the crash -->
    <polyline points="420,120 470,240 520,410 560,470" fill="none" stroke="#e0435a" stroke-width="5" stroke-dasharray="2 0"/>
    <circle cx="420" cy="120" r="7" fill="#c9a06a"/>
    <text x="360" y="96" font-family="'Yu Gothic',sans-serif" font-size="16" fill="#c9a06a">一万スター</text>
    <text x="470" y="470" font-family="'Yu Gothic',sans-serif" font-size="16" fill="#e0435a">解体・負債</text>
    <!-- crack marks -->
    <g stroke="#e0435a" stroke-width="1.4" opacity="0.7">
      <path d="M470,240 l-24,18"/><path d="M500,330 l26,14"/><path d="M540,440 l-22,10"/>
    </g>
  </g>
  <!-- price tag, foreground, swinging -->
  <g transform="translate(300,330) rotate(-12)">
    <path d="M0,0 L120,0 L156,44 L120,88 L0,88 Z" fill="#efe7d2"/>
    <circle cx="128" cy="44" r="9" fill="none" stroke="#8a7a5a" stroke-width="3"/>
    <text x="18" y="40" font-family="'Yu Mincho',serif" font-size="20" fill="#3a2c22">売却済</text>
    <text x="18" y="70" font-family="'Yu Gothic',sans-serif" font-size="22" fill="#b02a3d" font-weight="bold">×3.0</text>
    <line x1="128" y1="35" x2="128" y2="-40" stroke="#8a7a5a" stroke-width="2"/>
  </g>
  <!-- betrayer walking away into the dark, back turned -->
  <g fill="#050203" transform="translate(720,300)">
    <ellipse cx="0" cy="150" rx="34" ry="8" opacity="0.4"/>
    <path d="M0,-4 c-15,0 -24,11 -24,26 l-3,110 c-1,8 6,14 15,14 l24,0 c9,0 16,-6 15,-14 l-3,-110 c0,-15 -9,-26 -24,-26 z"/>
    <circle cx="0" cy="-20" r="16"/>
    <!-- long shadow trailing back toward the graph -->
    <polygon points="-24,150 -300,150 -220,164 -24,164" opacity="0.25"/>
  </g>
  <rect x="18" y="502" width="864" height="40" fill="#000000" opacity="0.45"/>
  <text x="36" y="529" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="19" fill="#e9c7cd" letter-spacing="2">――奪える奴が勝つ。奪われる奴が負ける。</text>
  <rect x="18" y="18" width="864" height="524" fill="none" stroke="#8a3446" stroke-width="1.5" opacity="0.6"/>
</svg>
