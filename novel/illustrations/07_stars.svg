<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="星空の丘で、頂点を見上げる三人のシルエット">
  <defs>
    <linearGradient id="sky07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1430"/>
      <stop offset="0.6" stop-color="#182a52"/>
      <stop offset="1" stop-color="#3a5a86"/>
    </linearGradient>
    <radialGradient id="star07" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffbe0"/>
      <stop offset="1" stop-color="#ffe27a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="560" fill="#060a18"/>
  <rect x="18" y="18" width="864" height="524" fill="url(#sky07)"/>
  <!-- scattered stars -->
  <g fill="#eaf1ff">
    <circle cx="90" cy="80" r="1.6"/><circle cx="160" cy="140" r="1.2"/><circle cx="230" cy="70" r="2"/>
    <circle cx="300" cy="120" r="1.3"/><circle cx="380" cy="60" r="1.7"/><circle cx="120" cy="200" r="1.1"/>
    <circle cx="560" cy="90" r="1.5"/><circle cx="640" cy="150" r="1.2"/><circle cx="720" cy="80" r="1.9"/>
    <circle cx="790" cy="140" r="1.3"/><circle cx="700" cy="210" r="1.1"/><circle cx="500" cy="160" r="1.4"/>
    <circle cx="440" cy="110" r="1.2"/><circle cx="820" cy="70" r="1.5"/><circle cx="60" cy="130" r="1.3"/>
  </g>
  <!-- moon -->
  <circle cx="720" cy="130" r="46" fill="#f3f0da"/>
  <circle cx="738" cy="120" r="46" fill="#182a52"/>
  <!-- the bright star being reached for -->
  <circle cx="450" cy="120" r="70" fill="url(#star07)"/>
  <g fill="#fff8d0">
    <path d="M450,80 l8,28 l28,8 l-28,8 l-8,28 l-8,-28 l-28,-8 l28,-8 z"/>
  </g>
  <!-- twinkles -->
  <g fill="#fffbe0">
    <path d="M300,220 l4,12 l12,4 l-12,4 l-4,12 l-4,-12 l-12,-4 l12,-4 z"/>
    <path d="M600,240 l3,10 l10,3 l-10,3 l-3,10 l-3,-10 l-10,-3 l10,-3 z"/>
  </g>
  <!-- hill -->
  <path d="M18,470 C260,400 640,400 882,470 L882,542 L18,542 Z" fill="#050912"/>
  <path d="M18,500 C300,455 600,455 882,500 L882,542 L18,542 Z" fill="#020509"/>
  <!-- three silhouettes on the hill, looking up; center one reaching a hand toward the star -->
  <g fill="#01030a">
    <!-- Ban (left, tall) -->
    <g transform="translate(360,470)">
      <path d="M0,-96 c-14,0 -23,11 -23,25 l0,66 c0,5 4,9 11,9 l24,0 c7,0 11,-4 11,-9 l0,-66 c0,-14 -9,-25 -23,-25 z"/>
      <circle cx="0" cy="-110" r="15"/>
    </g>
    <!-- Minato (center), reaching up -->
    <g transform="translate(450,470)">
      <path d="M0,-104 c-13,0 -22,10 -22,24 l0,72 c0,5 4,9 10,9 l24,0 c6,0 10,-4 10,-9 l0,-72 c0,-14 -9,-24 -22,-24 z"/>
      <circle cx="0" cy="-118" r="15"/>
      <!-- arm reaching toward the star -->
      <path d="M12,-100 L36,-190 l12,4 l-24,90 z"/>
      <circle cx="42" cy="-192" r="7"/>
    </g>
    <!-- Hina (right, small) -->
    <g transform="translate(540,470)">
      <path d="M0,-80 c-11,0 -18,9 -18,20 l0,52 c0,5 4,8 9,8 l18,0 c5,0 9,-3 9,-8 l0,-52 c0,-11 -7,-20 -18,-20 z"/>
      <circle cx="0" cy="-92" r="12"/>
    </g>
  </g>
  <rect x="18" y="502" width="864" height="40" fill="#000000" opacity="0.4"/>
  <text x="36" y="529" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="20" fill="#fff2c4" letter-spacing="3">――灰よ、星を掴め。</text>
  <rect x="18" y="18" width="864" height="524" fill="none" stroke="#ffe27a" stroke-width="1.5" opacity="0.5"/>
</svg>
