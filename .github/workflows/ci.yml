name: CI

# PR / push 時の安全検証。コードやドキュメントを一切書き換えず、検証のみを行う
# (contents: read の最小権限)。runaway 防止のため、このワークフローは Issue 生成・
# コミット・push を行わない。
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Check required docs
        run: node scripts/ci/check-required-docs.js

      - name: Check for conflict markers
        run: node scripts/ci/check-conflict-markers.js

      - name: Check for secret patterns
        run: node scripts/ci/check-secret-patterns.js

      - name: Test
        run: npm test

      - name: Build
        run: npm run build --if-present

      # E2E: 代表シナリオ(チャットコマンド/保管庫)を実ブラウザで検証する。
      # dist は直前の Build ステップで生成済み。外部送信なし(ローカル静的配信のみ)。
      - name: Install chromium for E2E
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm --prefix apps/sales-workspace run e2e
