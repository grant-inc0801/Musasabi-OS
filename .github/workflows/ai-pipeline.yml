name: AI Developer Workflow

on:
  issues:
    types: [opened] # Issueが作成されたら起動

jobs:
  ai_workflow:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai anthropic requests

      # --- STEP 1: ChatGPTによる指示書作成 ---
      - name: Generate Spec with ChatGPT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python - <<EOF
          import os
          from openai import OpenAI

          client = OpenAI()
          
          prompt = f"以下の要望を元に、開発者が実装するための詳細な『技術指示書（要件定義とタスクリスト）』をMarkdown形式で作成してください。\n\nタイトル: {os.getenv('ISSUE_TITLE')}\n内容: {os.getenv('ISSUE_BODY')}"
          
          response = client.chat.completions.create(
              model="gpt-4o", # 最適なモデルを選択
              messages=[{"role": "user", "content": prompt}]
          )
          
          spec = response.choices[0].message.content
          with open("instructions.md", "w") as f:
              f.write(spec)
          print("--- ChatGPT Instructions Generated ---")
          EOF

      # --- STEP 2: Claudeによるコード生成（指示書をインプットにする） ---
      - name: Generate Code with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<EOF
          import os
          import anthropic

          client = anthropic.Anthropic()
          
          # ChatGPTが作った指示書を読み込む
          with open("instructions.md", "r") as f:
              instructions = f.read()
          
          prompt = f"以下の開発指示書に従って、必要なプログラムコードのみを出力してください。\n\n【指示書】\n{instructions}"
          
          message = client.messages.create(
              model="claude-3-5-sonnet-20240620",
              max_tokens=4000,
              messages=[{"role": "user", "content": prompt}]
          )
          
          # 生成されたコードを保存
          with open("generated_code.py", "w") as f:
              f.write(message.content[0].text)
          print("--- Claude Code Generated ---")
          EOF

      # --- STEP 3: 結果をGitHubにフィードバック ---
      - name: Create Pull Request or Comment
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI generated code based on Issue #${{ github.event.issue.number }}"
          title: "AI自動生成: ${{ github.event.issue.title }}"
          body: |
            ChatGPTとClaudeが自動生成したコードです。
            
            ### 🛠️ ChatGPTが作成した指示書
            $(cat instructions.md)
          branch: "ai-feature-${{ github.event.issue.number }}"
