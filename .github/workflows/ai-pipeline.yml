name: Autonomous AI Developer Loop

# DISABLED (Epic β-001 Phase 0 remediation):
# This workflow overwrote main_app.py/spec.md on every issue and auto-opened
# a new "[NEXT] ..." issue afterwards, without ever accumulating real code.
# The commit history it produced ("AI Auto-Commit: Completed task ...") does
# not reflect working features. Trigger changed to manual-only so it can no
# longer spawn issues or overwrite files on its own. See docs/ARCHITECTURE.md.
on:
  workflow_dispatch: {}

jobs:
  ai_pipeline:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai requests

      - name: 1. ChatGPT - Generate Specification
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          cat > generate_spec.py <<'PY'
          import os
          from openai import OpenAI

          client = OpenAI()

          prompt = f"""現在のタスク指示です。
          これを元に実装用の『技術指示書』をMarkdownで作成してください。

          タスク: {os.getenv('ISSUE_TITLE')}
          詳細: {os.getenv('ISSUE_BODY')}
          """

          res = client.chat.completions.create(
              model="gpt-4o",
              messages=[{"role": "user", "content": prompt}]
          )

          with open("spec.md", "w", encoding="utf-8") as f:
              f.write(res.choices[0].message.content)
          PY
          python generate_spec.py

      - name: 2. Codex - Code Generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > generate_code.py <<'PY'
          from openai import OpenAI

          client = OpenAI()

          with open("spec.md", "r", encoding="utf-8") as f:
              spec = f.read()

          prompt = f"""以下の指示書に従って、プログラムコードのみを記述してください。
          解説文は一切省き、コードのみを出力してください。

          【指示書】
          {spec}
          """

          res = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "あなたはコード出力専門のエンジニアです。"},
                  {"role": "user", "content": prompt}
              ]
          )

          with open("main_app.py", "w", encoding="utf-8") as f:
              f.write(res.choices[0].message.content)
          PY
          python generate_code.py

      - name: 3. Commit Code Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add main_app.py spec.md
          git commit -m "AI Auto-Commit: Completed task ${{ github.event.issue.title }}" || echo "No changes to commit"
          git push

      - name: 4. ChatGPT - Generate Next Task and Loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TASK: ${{ github.event.issue.title }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat > create_next_issue.py <<'PY'
          import os
          import json
          import requests
          from openai import OpenAI

          with open("main_app.py", "r", encoding="utf-8") as f:
              code = f.read()

          client = OpenAI()

          prompt = f"""
          あなたはMusasabi OSのAIプロジェクトマネージャーです。
          現在のタスク「{os.getenv('CURRENT_TASK')}」が完了しました。

          現在のコードを元に、次に実装すべき機能を1つだけ考えて、
          GitHub Issue用のJSONを作成してください。

          必ず以下のJSON形式のみで返してください。

          {{
            "title": "[NEXT] 次に実装する機能名",
            "body": "目的、実装内容、完了条件を含む詳細"
          }}

          【現在のコード】
          {code}
          """

          res = client.chat.completions.create(
              model="gpt-4o",
              response_format={"type": "json_object"},
              messages=[{"role": "user", "content": prompt}]
          )

          next_task = json.loads(res.choices[0].message.content)

          repo = os.getenv("GITHUB_REPOSITORY")
          url = f"https://api.github.com/repos/{repo}/issues"

          headers = {
              "Authorization": f"Bearer {os.getenv('GITHUB_TOKEN')}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          data = {
              "title": next_task["title"],
              "body": next_task["body"],
              "labels": ["ai-task", "musasabi-os"]
          }

          response = requests.post(url, headers=headers, json=data)

          if response.status_code == 201:
              print(f"成功: 次のタスク『{next_task['title']}』を自動投稿しました。")
          else:
              print("エラー: Issueの自動投稿に失敗しました。")
              print(response.status_code)
              print(response.text)
              raise SystemExit(1)
          PY
          python create_next_issue.py

      - name: 5. Close Current Issue
        env:
          GITHUB_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "AIによってタスクが完了したため、このIssueを閉じます。次のタスクへ移行しました。"
