name: Decision Needed Comment

# chatgpt-decision-needed ラベルが Issue に付与されたら、確認待ちのテンプレコメントを
# 1件投稿する。ラベル付与時のみ動作し、Issue の作成(opened)では動かない
# (issues.opened で実装を開始しない、という安全ルール)。Issue の生成もしない。
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  comment:
    if: github.event.label.name == 'chatgpt-decision-needed'
    runs-on: ubuntu-latest
    steps:
      - name: Post decision-needed template comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'ChatGPT確認待ちです。',
                '',
                '`docs/ai-handoff/CLAUDE_QUESTIONS.md` とこのIssueの内容をもとに、',
                'ChatGPTが指示書(`docs/ai-handoff/CHATGPT_DIRECTIVE.md`)を作成します。',
                '',
                '- 決定が確定するまで、この件に関する実装は開始しません。',
                '- 決定内容は `docs/ai-handoff/DECISION_LOG.md` に記録されます。'
              ].join('\n')
            })
