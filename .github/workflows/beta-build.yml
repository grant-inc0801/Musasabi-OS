name: Beta Build

# β版評価ビルドの生成。手動実行のみ(workflow_dispatch)。自動トリガーは持たない。
# secrets を必要とせず、成果物を artifact として保存する。実配信・署名は行わない。
# GitHub Releases への公開は自動化せず、artifact を人間が確認してから手動で行う
# (手順は README「β版評価ビルドの起動手順」参照)。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # テストと Web フロントの検証(Linux で高速に回す)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: musasabi-beta-web-${{ github.sha }}
          path: apps/sales-workspace/dist
          if-no-files-found: warn
          retention-days: 14

  # Windows 向け Tauri β版インストーラ(.exe / .msi)のビルド(D-20260706-003)。
  # windows-latest には Rust stable と WebView2 がプリインストールされている。
  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Windows installer (tauri build)
        run: npm run build:desktop

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musasabi-beta-windows-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
